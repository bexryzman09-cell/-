<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --border: rgba(255, 255, 255, 0.1);
            --up: #10b981;
            --down: #ef4444;
            --glass: blur(12px);
        }

        .light-theme {
            --bg: #f1f5f9;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text: #0f172a;
            --accent: #0284c7;
            --border: rgba(0, 0, 0, 0.1);
            --glass: blur(8px);
        }

        * {
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* Загрузка */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Контейнер */
        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .btn-theme {
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            backdrop-filter: var(--glass);
            cursor: pointer;
            font-weight: 600;
        }

        .btn-theme:hover {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* Сетка */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        @media (max-width: 850px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .full-width {
            grid-column: 1 / -1;
        }

        /* Таблица */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px;
        }

        th {
            text-align: left;
            padding: 15px;
            color: var(--accent);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.03);
        }

        .badge {
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .up {
            background: rgba(16, 185, 129, 0.1);
            color: var(--up);
        }

        .down {
            background: rgba(239, 68, 68, 0.1);
            color: var(--down);
        }

        h2 {
            margin-top: 0;
            font-weight: 700;
            font-size: 1.4rem;
        }
    </style>
</head>

<body>

    <div id="loader">
        <div class="spinner"></div>
    </div>

    <div class="dashboard">
        <header>
            <div>
                <h1>Analytics <span style="color: var(--accent)">Pro</span></h1>
                <p style="opacity: 0.6; margin: 0;">Мониторинг личных показателей</p>
            </div>
            <button class="btn-theme" onclick="toggleTheme()">🌓 Сменить тему</button>
        </header>

        <div class="grid">
            <div class="card full-width">
                <h2>История оценок</h2>
                <div class="table-container">
                    <table id="dataTable">
                        <thead>
                            <tr>
                                <th>Дата</th>
                                <th>Результат</th>
                                <th>Тренд</th>
                                <th>Разница</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <h2>Динамика прогресса</h2>
                <canvas id="lineChart" height="250"></canvas>
            </div>

            <div class="card">
                <h2>Распределение зон</h2>
                <canvas id="pieChart" height="250"></canvas>
            </div>
        </div>
    </div>

    <script>
        // МЕНЯЙТЕ ДАННЫЕ ЗДЕСЬ
        const myData = [
            { date: "20 Апр", score: 90 },
            { date: "21 Апр", score: 95 },
            { date: "22 Апр", score: 82 },
            { date: "23 Апр", score: 98 },
            { date: "24 Апр", score: 45 },
            { date: "25 Апр", score: 100 },
            { date: "26 Апр", score: 100 },
            { date: "27 Апр", score: 65 },
            { date: "28 Апр", score: 85 }
        ];

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => document.getElementById('loader').remove(), 500);
                initApp();
            }, 1200);
        };

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
        }

        function initApp() {
            const tbody = document.querySelector('#dataTable tbody');
            let stats = { low: 0, mid: 0, high: 0 };

            myData.forEach((entry, i) => {
                let diff = 0;
                let arrow = "●";
                let statusClass = "neutral";

                if (i > 0) {
                    diff = entry.score - myData[i - 1].score;
                    if (diff > 0) { arrow = "↗"; statusClass = "up"; }
                    else if (diff < 0) { arrow = "↘"; statusClass = "down"; }
                }

                if (entry.score <= 50) stats.low++;
                else if (entry.score <= 75) stats.mid++;
                else stats.high++;

                tbody.innerHTML += `
                <tr>
                    <td>${entry.date}</td>
                    <td><strong style="font-size: 1.1rem">${entry.score}</strong></td>
                    <td><span class="badge ${statusClass}">${arrow}</span></td>
                    <td class="${statusClass}">${diff > 0 ? '+' + diff : diff}</td>
                </tr>
            `;
            });

            const ctx1 = document.getElementById('lineChart').getContext('2d');
            const gradient = ctx1.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(56, 189, 248, 0.4)');
            gradient.addColorStop(1, 'rgba(56, 189, 248, 0)');

            new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: myData.map(d => d.date),
                    datasets: [{
                        label: 'Баллы',
                        data: myData.map(d => d.score),
                        borderColor: '#38bdf8',
                        borderWidth: 4,
                        pointBackgroundColor: '#38bdf8',
                        pointRadius: 6,
                        pointHoverRadius: 8,
                        tension: 0.4,
                        fill: true,
                        backgroundColor: gradient
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#64748b' } },
                        x: { grid: { display: false }, ticks: { color: '#64748b' } }
                    }
                }
            });

            new Chart(document.getElementById('pieChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Критично', 'Норма', 'Отлично'],
                    datasets: [{
                        data: [stats.low, stats.mid, stats.high],
                        backgroundColor: ['#ef4444', '#f59e0b', '#10b981'],
                        hoverOffset: 15,
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    cutout: '70%',
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#64748b', usePointStyle: true } }
                    }
                }
            });
        }
    </script>
</body>

</html>
