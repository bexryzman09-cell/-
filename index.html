<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель Управления Прогрессом</title>
    <link rel="shortcut icon" href="/img/logo.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #05070a;
            --card-bg: rgba(17, 25, 40, 0.75);
            --text: #e2e8f0;
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --border: rgba(255, 255, 255, 0.1);
            --up: #00ff88;
            --down: #ff4d4d;
            --glass: blur(16px) saturate(180%);
        }

        .light-theme {
            --bg: #f8fafc;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text: #0f172a;
            --accent: #0ea5e9;
            --border: rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            margin: 0;
            font-family: 'JetBrains Mono', monospace;
            /* Тот самый прикольный шрифт */
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* Анимация загрузки */
        #loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 3px solid transparent;
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s infinite linear;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Контейнер приложения */
        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            opacity: 0;
            animation: slideDown 0.8s forwards;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-30px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        /* Стиль карточек */
        .card {
            background: var(--card-bg);
            backdrop-filter: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            opacity: 0;
            transform: translateY(30px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* Поочередная анимация появления карточек */
        .card:nth-child(1) {
            animation: slideUp 0.6s forwards 0.2s;
        }

        .card:nth-child(2) {
            animation: slideUp 0.6s forwards 0.4s;
        }

        .card:nth-child(3) {
            animation: slideUp 0.6s forwards 0.6s;
        }

        @keyframes slideUp {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-5px);
        }

        .full-width {
            grid-column: 1 / -1;
        }

        /* Таблица */
        .table-wrap {
            overflow-x: auto;
            margin-top: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th {
            text-align: left;
            padding: 15px;
            color: var(--accent);
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--border);
        }

        tr:last-child td {
            border: none;
        }

        .trend {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .up {
            color: var(--up);
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.4);
        }

        .down {
            color: var(--down);
            text-shadow: 0 0 10px rgba(255, 77, 77, 0.4);
        }

        .theme-toggle {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
        }

        h2 {
            margin: 0 0 20px 0;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h2::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--accent);
            border-radius: 2px;
        }
    </style>
</head>

<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 20px; letter-spacing: 2px;">ЗАГРУЗКА ДАННЫХ...</p>
    </div>

    <div class="dashboard">
        <header>
            <div>
                <h1 style="margin:0; font-size: 1.8rem;">АНАЛИТИКА <span style="color: var(--accent);">2026</span></h1>
                <p style="opacity: 0.5; font-size: 0.8rem;">Система мониторинга баллов</p>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()">СМЕНИТЬ ТЕМУ</button>
        </header>

        <div class="grid">
            <div class="card full-width">
                <h2>Журнал активности</h2>
                <div class="table-wrap">
                    <table id="mainTable">
                        <thead>
                            <tr>
                                <th>Дата</th>
                                <th>Балл</th>
                                <th>Статус</th>
                                <th>Изменение</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div class="card">
                <h2>Динамика роста</h2>
                <canvas id="lineChart"></canvas>
            </div>

            <div class="card">
                <h2>Распределение</h2>
                <canvas id="pieChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // --- ДАННЫЕ (МЕНЯЙ В КОДЕ ТУТ) ---
        const myData = [
            { date: "20 Апр", score: 90 },
            { date: "21 Апр", score: 93 },
            { date: "22 Апр", score: 80 },
            { date: "23 Апр", score: 98 },
            { date: "24 Апр", score: 10 },
            { date: "25 Апр", score: 15 },
            { date: "26 Апр", score: 60 },
            { date: "27 Апр", score: 75 },
            { date: "28 Апр", score: 88 }
        ];

        // Имитация загрузки
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
                renderDashboard();
            }, 1500);
        });

        function toggleTheme() {
            document.body.classList.toggle('light-theme');
        }

        function renderDashboard() {
            const tbody = document.querySelector('#mainTable tbody');
            let cats = { low: 0, mid: 0, high: 0 };

            myData.forEach((entry, i) => {
                let diff = 0;
                let icon = "◈";
                let cls = "";

                if (i > 0) {
                    diff = entry.score - myData[i - 1].score;
                    if (diff > 0) { icon = "▲"; cls = "up"; }
                    else if (diff < 0) { icon = "▼"; cls = "down"; }
                }

                if (entry.score <= 50) cats.low++;
                else if (entry.score <= 75) cats.mid++;
                else cats.high++;

                tbody.innerHTML += `
                <tr>
                    <td>${entry.date}</td>
                    <td><b style="font-size: 1.2rem">${entry.score}</b></td>
                    <td><span class="trend ${cls}">${icon} ${diff > 0 ? 'РОСТ' : diff < 0 ? 'СПАД' : 'СТАБ'}</span></td>
                    <td class="${cls}">${diff > 0 ? '+' + diff : diff}</td>
                </tr>
            `;
            });

            // График 1
            const ctxL = document.getElementById('lineChart').getContext('2d');
            new Chart(ctxL, {
                type: 'line',
                data: {
                    labels: myData.map(d => d.date),
                    datasets: [{
                        label: 'Успеваемость',
                        data: myData.map(d => d.score),
                        borderColor: '#00f2ff',
                        backgroundColor: 'rgba(0, 242, 255, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 5,
                        borderWidth: 3
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { grid: { color: 'rgba(255,255,255,0.05)' } },
                        x: { grid: { display: false } }
                    }
                }
            });

            // График 2
            new Chart(document.getElementById('pieChart'), {
                type: 'doughnut',
                data: {
                    labels: ['0-50 (Слабо)', '51-75 (Норма)', '76-100 (Топ)'],
                    datasets: [{
                        data: [cats.low, cats.mid, cats.high],
                        backgroundColor: ['#ff4d4d', '#ffcc00', '#00ff88'],
                        borderWidth: 0,
                        hoverOffset: 20
                    }]
                },
                options: {
                    cutout: '65%',
                    plugins: { legend: { position: 'bottom', labels: { color: '#888', font: { family: 'JetBrains Mono' } } } }
                }
            });
        }
    </script>

</body>

</html>
